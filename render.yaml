services:
  - type: web
    name: darbha-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SITE_DOMAIN
        value: darbha.info
      - key: CORS_ORIGINS
        value: https://darbha.info
      - key: PORT
        value: "4000"
